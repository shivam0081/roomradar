services:
  # ─── Backend: Express + Socket.io ───────────────────────────────────────────
  - type: web
    name: roomradar-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false        # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false        # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false        # set to your Static Site URL after deploy

  # ─── Frontend: React/Vite Static Site ───────────────────────────────────────
  - type: web
    name: roomradar
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false        # set to https://roomradar-api.onrender.com/api
      - key: VITE_SOCKET_URL
        sync: false        # set to https://roomradar-api.onrender.com
